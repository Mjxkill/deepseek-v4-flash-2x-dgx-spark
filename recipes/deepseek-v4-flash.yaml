recipe_version: '1'
model: deepseek-ai/DeepSeek-V4-Flash
runtime: vllm-ray
builder: eugr
min_nodes: 2
container: vllm-node
cluster_only: true
metadata:
  description: vLLM DeepSeek-V4-Flash 2-node, 1M context (hardcoded MTP speculative-config, trap #1)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  # 0.80 -> 0.88 once earlyoom + the desktop stack are gone (optimize-spark.sh,
  # trap #6): ~10 GiB more usable per node.
  gpu_memory_utilization: 0.88
  # 1M = the model's native trained context. MLA makes KV nearly free: at boot vLLM
  # reserves a ~19 GiB pool holding 2,856,813 tokens (2.72x concurrency at 1M) — no
  # --kv-cache-memory-bytes trick needed. The launcher's "Max context 784k" banner
  # is a bf16 estimate; trust vLLM's "GPU KV cache size: N tokens" line at boot.
  max_model_len: 1048576
  block_size: 256
  max_num_seqs: 4
  max_num_batched_tokens: 8192
  num_speculative_tokens: 2
env:
  DG_JIT_USE_NVRTC: '0'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  VLLM_USE_BREAKABLE_CUDAGRAPH: '0'
  NCCL_DEBUG: 'INFO'
  NCCL_DEBUG_SUBSYS: 'INIT,NET,GRAPH'
command: |
  vllm serve deepseek-ai/DeepSeek-V4-Flash \
      --host {host} \
      --port {port} \
      --trust-remote-code \
      --tensor-parallel-size {tensor_parallel} \
      --kv-cache-dtype fp8 \
      --block-size {block_size} \
      --max-model-len {max_model_len} \
      --max-num-seqs {max_num_seqs} \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --enable-prefix-caching \
      --speculative-config '{"method":"mtp","num_speculative_tokens":2}' \
      --tokenizer-mode deepseek_v4 \
      --distributed-executor-backend ray \
      --tool-call-parser deepseek_v4 \
      --enable-auto-tool-choice \
      --reasoning-parser deepseek_v4 \
      --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
      --default-chat-template-kwargs.thinking=true \
      --default-chat-template-kwargs.reasoning_effort=high \
      --load-format instanttensor
